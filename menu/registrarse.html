  <img class="is-rounded" src="../imagenes/inicio/image.jpg" />
</figure>
</a>
    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">

      <span aria-hidden="true"></span>

      <a class="navbar-item" href="../index.html">

        </div>
      </div>
    </div>

</nav>
</header>


<section class="hero is-link is-bold">

  <div class="hero-body">

    <div class="container">

      <h1 class="title has-text-centered is-size-1">
        Regístrate
      </h1>

      <h2 class="subtitle has-text-centered is-size-4">
        Crea una cuenta para unirte al mundo del fútbol
      </h2>

    </div>

  </div>

</section>


<section class="section has-background-link-light">

  <div class="container">

    <div class="columns is-centered">

      <div class="column is-6">

        <div class="box">

          
          <figure class="image is-128x128" style="margin:auto;">
            <img 
            class="is-rounded"
            src="../imagenes/registrarse/user.png" 
            alt="">
          </figure>

          <br>

         
          <div class="field">

            <label class="label">
               Nombre completo
            </label>

            <div class="control">

              <input 
              class="input is-link"
              type="text"
              placeholder="Ingrese su nombre">

            </div>

          </div>

          
          <div class="field">

            <label class="label">
               Correo electrónico
            </label>

            <div class="control">

              <input 
              class="input is-link"
              type="email"
              placeholder="Ingrese su correo">

            </div>

          </div>

         
          <div class="field">

            <label class="label">
               Usuario
            </label>

            <div class="control">

              <input 
              class="input is-link"
              type="text"
              placeholder="Cree un usuario">

            </div>

          </div>

          
          <div class="field">

            <label class="label">
               Contraseña
            </label>

            <div class="control">

              <input 
              class="input is-link"
              type="password"
              placeholder="Cree una contraseña">

            </div>

          </div>

         
          <div class="field">

            <label class="label">
               Confirmar contraseña
            </label>

            <div class="control">

              <input 
              class="input is-link"
              type="password"
              placeholder="Confirme la contraseña">

            </div>

          </div>

          <br>

          
          <div class="has-text-centered">

            <button class="button is-link is-medium is-rounded">
              Crear Cuenta
            </button>

          </div>

          <br>

         
          <p class="has-text-centered">

            ¿Ya tienes cuenta?

            <a href="login.html">
              Iniciar sesión
            </a>

          </p>

        </div>

      </div>

    </div>

  </div>

</section>

<script>
  document.addEventListener('DOMContentLoaded', () => {

  // Get all "navbar-burger" elements
  const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

  // Add a click event on each of them
  $navbarBurgers.forEach( el => {
    el.addEventListener('click', () => {

      // Get the target from the "data-target" attribute
      const target = el.dataset.target;
      const $target = document.getElementById(target);

      // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
      el.classList.toggle('is-active');
      $target.classList.toggle('is-active');

    });
  });

});
</script>
